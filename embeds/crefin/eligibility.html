<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
    <head>
    <base href="/">
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Loan Eligibility Calculator | KnowYourEMI</title>

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script>
        const isLocal =
            location.hostname === "localhost" ||
            location.hostname === "127.0.0.1" ||
            location.hostname.includes("192.168.") ||
            location.hostname.includes("dev.");

        if (!isLocal) {
            const gtagScript = document.createElement("script");
            gtagScript.async = true;
            gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=G-EM8B59T3F5";
            document.head.appendChild(gtagScript);

            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag("js", new Date());
            gtag("config", "G-EM8B59T3F5");
        } else {
            console.log("🧩 GA4 tracking disabled on localhost/development environment");
        }
    </script>

    <style>
        html, body { overflow-x: hidden; }

        /* Active loan type button — overrides Tailwind bg-blue-600 */
        .eligibility-type-btn.active,
        .eligibility-type-btn.bg-blue-600 {
            background-color: #005B95 !important;
            color: #ffffff !important;
            box-shadow: 0 2px 8px rgba(0, 91, 149, 0.3);
        }
        .eligibility-type-btn.active:hover,
        .eligibility-type-btn.bg-blue-600:hover {
            background-color: #004d7e !important;
        }
        .eligibility-type-btn {
            border: 1.5px solid #e5e7eb;
            transition: all 0.15s ease;
        }
        .eligibility-type-btn:not(.active):not(.bg-blue-600):hover {
            border-color: #005B95;
            color: #005B95;
        }
        #eligIncome:focus, #eligObligations:focus {
            outline: none;
            border-color: #005B95;
            box-shadow: 0 0 0 3px rgba(0, 91, 149, 0.15);
        }
        .crefin-check-btn {
            background-color: #005B95;
            color: #ffffff;
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
        }
        .crefin-check-btn:hover {
            background-color: #004d7e;
            box-shadow: 0 4px 12px rgba(0, 91, 149, 0.35);
        }

    </style>
    </head>

    <body class="bg-gray-50 relative text-gray-800 overflow-x-hidden scroll-smooth">
        <main class="max-w-7xl w-full mx-auto px-1 py-10 overflow-x-hidden sm:px-4">
            <!-- Loan Eligibility Calculator -->
            <section id="eligibilityCalculator" class="bg-white shadow-lg rounded-2xl p-6">
                <h2 class="text-xl font-semibold mb-3 text-gray-800">Loan Eligibility Calculator</h2>
                <p class="text-sm text-gray-600 mb-6">
                    Estimate how much loan you may be eligible for based on your monthly income and current obligations.
                </p>

                <!-- Loan Type Buttons -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
                    <button type="button" data-loantype="personal"
                        class="eligibility-type-btn bg-gray-100 text-gray-800 rounded-xl py-2 font-medium transition">
                        Personal Loan
                    </button>
                    <button type="button" data-loantype="home"
                        class="eligibility-type-btn bg-gray-100 text-gray-800 rounded-xl py-2 font-medium transition">
                        Home Loan
                    </button>
                    <button type="button" data-loantype="car"
                        class="eligibility-type-btn bg-gray-100 text-gray-800 rounded-xl py-2 font-medium transition">
                        Car Loan
                    </button>
                </div>

                <!-- Input Fields -->
                <div class="grid sm:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Income (₹)</label>
                        <input id="eligIncome" type="number" placeholder="e.g., 75000"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:outline-none"
                            style="--tw-ring-color: #005B95;">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Existing EMIs / Obligations (₹)</label>
                        <input id="eligObligations" type="number" placeholder="e.g., 10000"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:outline-none"
                            style="--tw-ring-color: #005B95;">
                    </div>
                </div>

                <!-- Check Button -->
                <button id="checkEligibilityBtn"
                    class="crefin-check-btn px-6 py-2 rounded-lg shadow font-semibold transition">
                    Check Eligibility
                </button>

                <!-- Result Box -->
                <div id="eligibilityResult" class="hidden mt-6 crefin-result p-5 rounded-2xl shadow-md">
                    <h3 class="text-lg font-semibold mb-2">Estimated Loan Eligibility</h3>
                    <p id="eligibilityOutput" class="font-medium"></p>
                    <p id="eligibilityNote" class="text-xs mt-2 italic"></p>
                </div>

                <!-- Powered by -->
                <div class="flex justify-center items-center mt-6 mb-2 text-[11px] text-gray-500">
                    <span class="mr-1">Powered by</span>
                    <a href="https://www.knowyouremi.in/?ref=crefin" target="_blank" rel="noopener noreferrer"
                        class="flex items-center gap-1 font-medium text-gray-600 hover:text-blue-600 transition">
                        <img src="/logo-112x112.jpg" alt="KnowYourEMI" class="w-4 h-4 rounded-sm opacity-80">
                        <span class="hover:underline">KnowYourEMI</span>
                    </a>
                </div>
            </section>
        </main>

        <!-- Script -->
        <script>
            window.KYE_CLIENT = "crefin";
        </script>

        <script src="/embeds/crefin/eligibility.js"></script>

        <!-- Domain protection -->
        <script>
            (function () {
                const allowedDomains = [
                    "crefin.co.in",
                    "www.crefin.co.in",
                    "knowyouremi.in",
                    "www.knowyouremi.in",
                ];

                function isAllowed(host) {
                    return allowedDomains.some(domain =>
                        host === domain || host.endsWith("." + domain)
                    );
                }

                try {
                    const referrer = document.referrer;
                    const currentHost = window.location.hostname;

                    if (!referrer) {
                        if (isAllowed(currentHost)) { return; }
                        document.body.innerHTML = "";
                        return;
                    }

                    const referrerHost = new URL(referrer).hostname;

                    if (window.self === window.top || !isAllowed(referrerHost)) {
                        document.body.innerHTML = "";
                        return;
                    }
                } catch (e) {
                    document.body.innerHTML = "";
                }
            })();
        </script>

        <!-- Dynamic Height + postMessage -->
        <script>
        // ── 1. Dynamic Height ──────────────────────────────────────────────
        function sendHeight() {
            const height = document.documentElement.offsetHeight;
            window.parent.postMessage({ type: "kye-resize", height: height }, "*");
        }

        const kyeResizeObserver = new ResizeObserver(() => sendHeight());
        kyeResizeObserver.observe(document.body);

        window.addEventListener("load", () => {
            sendHeight();
            setTimeout(sendHeight, 500);
            setTimeout(sendHeight, 1200);
        });

        // ── 2. Modal open/close signals (null-safe — no modal on this page) ──
        const kyeModal = document.getElementById("partPaymentModal");
        if (kyeModal) {
            const kyeModalObserver = new MutationObserver(() => {
                const isOpen = !kyeModal.classList.contains("hidden");
                if (isOpen) {
                    window.parent.postMessage({
                        type: "kye-modal-open",
                        iframeScrollY: window.scrollY,
                        iframeHeight: document.documentElement.offsetHeight
                    }, "*");
                } else {
                    window.parent.postMessage({ type: "kye-modal-close" }, "*");
                }
            });
            kyeModalObserver.observe(kyeModal, {
                attributes: true,
                attributeFilter: ["class"]
            });
        }
        </script>

        <!-- GA4 embed event -->
        <script>
            if (typeof gtag !== "undefined") {
                gtag("event", "crefin_eligibility_loaded", {
                    event_category: "embed",
                    event_label: "crefin",
                    client: window.KYE_CLIENT
                });
            }
        </script>

    </body>
</html>
