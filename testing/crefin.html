<iframe
id="knowyour-emi-calculator"
src="/embeds/crefin/"
style="width:100%; border:none; display:block;"
scrolling="no">
</iframe>

<script>
window.addEventListener("message", function(event) {

  if (event.data.type === "kye-resize") {

    const iframe = document.getElementById("knowyour-emi-calculator");
    iframe.style.height = event.data.height + "px";

  }

});
</script>
